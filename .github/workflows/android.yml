name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Initialize and Build
        run: |
          # 1. إنشاء ملف gradlew إذا كان مفقوداً
          gradle wrapper
          # 2. إعطاء صلاحية التشغيل
          chmod +x gradlew
          # 3. البناء مع تخطي كل إعدادات الإحصائيات المسببة للمشاكل
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.parallel=false -Dorg.gradle.configureondemand=false
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
